// =================================================================
// CallVote Bans Manager - Advanced Configuration
// Version 2.0 - Modular Ban System
// =================================================================

// =================
// CORE SETTINGS
// =================

// Enable the plugin
// Default: "1"
sm_cvb_enable "1"

// Debug messages (0=Off, 1=Basic, 2=Verbose, 3=Full Debug)
// Default: "0"
sm_cvb_debug "0"

// Enable logging
// Default: "1"
sm_cvb_log "1"

// =================
// DATABASE SETTINGS
// =================

// Database driver (mysql, sqlite)
// Default: "mysql"
sm_cvb_database_driver "mysql"

// MySQL connection timeout (seconds)
// Default: "10"
sm_cvb_database_timeout "10"

// SQLite database file path (relative to sourcemod/data/)
// Default: "callvote_bans.sqlite"
sm_cvb_sqlite_file "callvote_bans.sqlite"

// Retry failed database connections
// Default: "1"
sm_cvb_database_retry "1"

// =================
// CACHE SETTINGS
// =================

// Enable StringMap cache (Level 1 - fastest)
// Default: "1"
sm_cvb_cache_stringmap "1"

// Enable SQLite cache (Level 2 - fast persistence)
// Default: "1"
sm_cvb_cache_sqlite "1"

// Cache TTL for temporary entries (minutes)
// Default: "30"
sm_cvb_cache_ttl "30"

// Maximum cache entries (0 = unlimited)
// Default: "1000"
sm_cvb_cache_max_entries "1000"

// =================
// BAN SETTINGS
// =================

// Default ban types (bitmask: 1=Kick, 2=Changelevel, 4=Nextlevel, 8=Restart)
// Default: "15" (all types)
sm_cvb_default_ban_types "15"

// Default temporary ban duration (minutes, 0 = permanent)
// Default: "1440" (24 hours)
sm_cvb_default_temp_duration "1440"

// Maximum temporary ban duration (minutes)
// Default: "10080" (7 days)
sm_cvb_max_temp_duration "10080"

// Allow users to check their own ban status
// Default: "1"
sm_cvb_allow_self_check "1"

// =================
// UI SETTINGS
// =================

// Menu timeout (seconds)
// Default: "30"
sm_cvb_menu_timeout "30"

// Show ban details in vote block messages
// Default: "1"
sm_cvb_show_ban_details "1"

// Use colored chat messages
// Default: "1"
sm_cvb_colored_messages "1"

// =================
// PERFORMANCE SETTINGS
// =================

// Enable threading for database operations
// Default: "1"
sm_cvb_threading "1"

// Maximum concurrent database operations
// Default: "5"
sm_cvb_max_concurrent_ops "5"

// Database operation queue size
// Default: "50"
sm_cvb_queue_size "50"

// =================
// INTEGRATION SETTINGS
// =================

// Enable CallVote Manager integration
// Default: "1"
sm_cvb_callvote_integration "1"

// Block votes immediately on ban check (faster response)
// Default: "1"
sm_cvb_fast_vote_block "1"

// =================
// MAINTENANCE SETTINGS
// =================

// Maximum log file size (MB, 0 = unlimited)
// Default: "10"
sm_cvb_max_log_size "10"