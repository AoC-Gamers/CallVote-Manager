name: Release

on:
  push:
    tags:
      - sourcemod/v*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SOURCEMOD_ARCHIVE_URL: https://sm.alliedmods.net/smdrop/1.12/sourcemod-1.12.0-git7223-linux.tar.gz

jobs:
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.release.outputs.component }}
      version: ${{ steps.release.outputs.version }}
      release_name: ${{ steps.release.outputs.release_name }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        run: bash ./scripts/ci-resolve-release.sh "${GITHUB_REF_NAME}"

      - name: Ensure tag points to main history
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main." >&2
            exit 1
          fi

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install SourceMod build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes curl tar python3

      - name: Verify GitHub CLI
        run: gh --version

      - name: Build SourceMod artifact
        run: bash ./scripts/ci-build-sourcemod.sh

      - name: Validate SourceMod artifact
        run: bash ./scripts/ci-validate-artifact.sh

      - name: Package release assets
        env:
          RELEASE_BASENAME: callvote-manager-${{ needs.prepare-release.outputs.version }}
        run: bash ./scripts/ci-package-release-assets.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          title="${{ needs.prepare-release.outputs.release_name }}"
          asset="dist/release/callvote-manager-${{ needs.prepare-release.outputs.version }}.zip"

          if gh release view "$tag" >/dev/null 2>&1; then
            if [[ "${{ needs.prepare-release.outputs.prerelease }}" == "true" ]]; then
              gh release edit "$tag" --title "$title" --prerelease
            else
              gh release edit "$tag" --title "$title" --latest
            fi

            gh release upload "$tag" "$asset" --clobber
            exit 0
          fi

          if [[ "${{ needs.prepare-release.outputs.prerelease }}" == "true" ]]; then
            gh release create "$tag" "$asset" --title "$title" --generate-notes --verify-tag --prerelease
          else
            gh release create "$tag" "$asset" --title "$title" --generate-notes --verify-tag --latest
          fi
